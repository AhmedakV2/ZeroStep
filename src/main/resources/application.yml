spring:
  application:
    name: zerostep
  profiles:
    active: dev
  main:
    allow-bean-definition-overriding: false
    banner-mode: console


  mail:
    host: smtp.gmail.com
    port: 587
    username: senin_email_adresin@gmail.com
    password: senin_uygulama_sifren
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true


  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
          batch_size: 30
        order_inserts: true
        order_updates: true
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
    time-zone: UTC

  task:
    scheduling:
      pool:
        size: 4
      thread-name-prefix: zerostep-sched-

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

app:
  security:
    jwt:
      secret: ${JWT_SECRET:CHANGE_ME_IN_PROD_this_must_be_at_least_256_bits_long_random_string_zerostep_dev}
      access-token-ttl-minutes: 15
      refresh-token-ttl-days: 7
      issuer: zerostep
    cors:
      allowed-origins:
        - http://localhost:5500
        - http://localhost:8080
        - http://127.0.0.1:5500
      allowed-origin-patterns:
        - chrome-extension://*
      allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
      max-age-seconds: 3600
  mail:
    enabled: false
    provider: smtp
    from-address: noreply@zerostep.local
    from-name: ZeroStep
  execution:
    max-concurrent-drivers: 5
    acquire-timeout-seconds: 30
    page-load-timeout-seconds: 60
    implicit-wait-seconds: 0
    screenshot-dir: ./screenshots
    headless: false
    window-width: 1920
    window-height: 1080

server:
  port: 8080
  shutdown: graceful
  compression:
    enabled: true
    mime-types: application/json,text/html,text/css,application/javascript
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false