<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroStep — Senaryo Detayı</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/layout.css">

    <style>
        /* ── Sayfa Layoutu ────────────────────────────────── */
        .step-editor-shell {
            display: grid;
            grid-template-columns: 240px 1fr 300px;
            grid-template-rows: 1fr;
            height: calc(100vh - 56px);
            overflow: hidden;
        }

        /* ── Sol Panel: Araç Paleti ───────────────────────── */
        .tool-palette {
            background: var(--clr-surface);
            border-right: 1px solid var(--clr-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tool-palette-header {
            padding: 0.875rem 1rem;
            border-bottom: 1px solid var(--clr-border);
            flex-shrink: 0;
        }

        .tool-palette-search {
            background: var(--clr-surface-2);
            border: 1px solid var(--clr-border);
            border-radius: var(--radius-sm);
            color: var(--clr-text);
            font-family: var(--font-body);
            font-size: 0.85rem;
            padding: 0.45rem 0.75rem;
            width: 100%;
        }
        .tool-palette-search:focus {
            border-color: var(--clr-border-focus);
            outline: none;
        }

        .tool-palette-body {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .tool-category {
            margin-bottom: 0.5rem;
        }

        .tool-category-label {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--clr-text-muted);
            padding: 0.4rem 0.5rem 0.25rem;
        }

        .tool-card {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.45rem 0.6rem;
            border: 1px solid var(--clr-border);
            border-radius: var(--radius-sm);
            margin-bottom: 3px;
            cursor: grab;
            background: var(--clr-surface-2);
            font-size: 0.8rem;
            color: var(--clr-text);
            transition: background var(--transition), border-color var(--transition);
            user-select: none;
        }
        .tool-card:hover {
            background: rgba(61,122,237,.12);
            border-color: var(--clr-primary);
            color: var(--clr-primary-h);
        }
        .tool-card:active { cursor: grabbing; }
        .tool-card-icon {
            font-size: 0.85rem;
            opacity: .7;
            flex-shrink: 0;
            width: 1.1rem;
            text-align: center;
        }
        .tool-card-name { flex: 1; font-weight: 500; }

        /* ── Orta Alan: Canvas ────────────────────────────── */
        .step-canvas-wrap {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--clr-bg);
        }

        /* Senaryo üst bar */
        .scenario-topbar {
            background: var(--clr-surface);
            border-bottom: 1px solid var(--clr-border);
            padding: 0 1rem;
            height: 48px;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-shrink: 0;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.85rem;
            color: var(--clr-text-muted);
        }
        .breadcrumb a { color: var(--clr-text-muted); }
        .breadcrumb a:hover { color: var(--clr-primary); }
        .breadcrumb-sep { opacity: .4; }
        .breadcrumb-current {
            color: var(--clr-text);
            font-weight: 600;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .view-toggle {
            display: flex;
            background: var(--clr-surface-2);
            border: 1px solid var(--clr-border);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }
        .view-toggle-btn {
            padding: 0.3rem 0.75rem;
            font-size: 0.8rem;
            font-weight: 600;
            border: none;
            background: transparent;
            color: var(--clr-text-muted);
            cursor: pointer;
            transition: background var(--transition), color var(--transition);
        }
        .view-toggle-btn.active {
            background: var(--clr-primary);
            color: #fff;
        }

        .autosave-indicator {
            font-size: 0.75rem;
            color: var(--clr-text-muted);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .autosave-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--clr-success);
            flex-shrink: 0;
        }
        .autosave-dot.saving { background: var(--clr-warning); animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }

        .canvas-actions { margin-left: auto; display: flex; align-items: center; gap: 0.5rem; }

        /* ── Diyagram Modu ────────────────────────────────── */
        #diagram-canvas {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .diagram-surface {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }

        .diagram-viewport {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-origin: 0 0;
            cursor: default;
        }

        /* Drop zone overlay */
        .drop-overlay {
            position: absolute;
            inset: 0;
            border: 2px dashed transparent;
            border-radius: var(--radius-md);
            pointer-events: none;
            transition: border-color .15s, background .15s;
            z-index: 10;
        }
        .drop-overlay.dragover {
            border-color: var(--clr-primary);
            background: rgba(61,122,237,.06);
        }

        /* Step Node */
        .step-node {
            position: absolute;
            width: 220px;
            background: var(--clr-surface);
            border: 1px solid var(--clr-border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: border-color .15s, box-shadow .15s;
            user-select: none;
        }
        .step-node:hover { border-color: var(--clr-primary); box-shadow: var(--shadow-md); }
        .step-node.selected {
            border-color: var(--clr-primary);
            box-shadow: 0 0 0 2px rgba(61,122,237,.3);
        }
        .step-node.disabled-node {
            opacity: .45;
        }

        .node-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.65rem;
            border-bottom: 1px solid var(--clr-border);
            border-radius: var(--radius-md) var(--radius-md) 0 0;
            background: var(--clr-surface-2);
        }
        .node-order {
            font-size: 0.65rem;
            font-weight: 700;
            background: var(--clr-primary);
            color: #fff;
            border-radius: 99px;
            padding: 0.1rem 0.4rem;
            flex-shrink: 0;
        }
        .node-action {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--clr-text);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: var(--font-ui);
        }
        .node-menu-btn {
            background: none;
            border: none;
            color: var(--clr-text-muted);
            cursor: pointer;
            padding: 0;
            font-size: 1rem;
            line-height: 1;
            flex-shrink: 0;
        }
        .node-menu-btn:hover { color: var(--clr-text); }

        .node-body {
            padding: 0.5rem 0.65rem;
            font-size: 0.75rem;
            color: var(--clr-text-muted);
        }
        .node-desc {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Bağlantı noktaları */
        .node-port {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--clr-surface);
            border: 2px solid var(--clr-border);
            transition: border-color .15s;
        }
        .node-port:hover { border-color: var(--clr-primary); }
        .port-in  { top: 50%; left: -7px;  transform: translateY(-50%); }
        .port-out { top: 50%; right: -7px; transform: translateY(-50%); }

        /* SVG ok bağlantıları */
        #connections-svg {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: visible;
        }
        .conn-path {
            fill: none;
            stroke: var(--clr-border);
            stroke-width: 2;
            stroke-dasharray: none;
        }

        /* Boş durum */
        .canvas-empty {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            pointer-events: none;
        }
        .canvas-empty-icon { font-size: 2.5rem; opacity: .2; }
        .canvas-empty-text { font-size: 0.9rem; color: var(--clr-text-muted); }

        /* ── Tablo Modu ───────────────────────────────────── */
        #table-canvas {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: none;
        }

        .step-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .step-table th {
            background: var(--clr-surface);
            padding: 0.6rem 0.875rem;
            text-align: left;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: var(--clr-text-muted);
            border-bottom: 1px solid var(--clr-border);
            white-space: nowrap;
        }
        .step-table td {
            padding: 0.65rem 0.875rem;
            border-bottom: 1px solid var(--clr-border);
            color: var(--clr-text);
            vertical-align: middle;
        }
        .step-table tbody tr:hover { background: var(--clr-surface); }
        .step-table tbody tr.selected-row { background: rgba(61,122,237,.08); }
        .step-table tbody tr.disabled-row td { opacity: .45; }
        .step-table tbody tr { cursor: pointer; }

        .drag-handle {
            cursor: grab;
            color: var(--clr-text-muted);
            font-size: 1rem;
            padding: 0 0.25rem;
        }
        .drag-handle:active { cursor: grabbing; }

        .row-dragging {
            background: rgba(61,122,237,.1) !important;
            border: 1px solid var(--clr-primary);
        }

        /* ── Sağ Panel: Özellikler ────────────────────────── */
        .step-props {
            background: var(--clr-surface);
            border-left: 1px solid var(--clr-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .props-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.875rem 1rem;
            border-bottom: 1px solid var(--clr-border);
            flex-shrink: 0;
        }
        .props-title { font-size: 0.85rem; font-weight: 700; }

        .props-actions {
            display: flex;
            gap: 0.3rem;
        }

        .props-body {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .props-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 0.75rem;
            color: var(--clr-text-muted);
            text-align: center;
        }
        .props-empty-icon { font-size: 2rem; opacity: .2; }
        .props-empty-text { font-size: 0.85rem; }

        .form-section {
            margin-bottom: 1.25rem;
        }
        .form-section-label {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--clr-text-muted);
            margin-bottom: 0.5rem;
        }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--clr-border);
        }
        .toggle-row:last-child { border-bottom: none; }
        .toggle-label { font-size: 0.85rem; color: var(--clr-text); }
        .toggle-switch {
            position: relative;
            width: 36px;
            height: 20px;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute;
            inset: 0;
            background: var(--clr-border);
            border-radius: 99px;
            cursor: pointer;
            transition: background .2s;
        }
        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            left: 3px;
            bottom: 3px;
            background: #fff;
            border-radius: 50%;
            transition: transform .2s;
        }
        .toggle-switch input:checked + .toggle-slider { background: var(--clr-primary); }
        .toggle-switch input:checked + .toggle-slider::before { transform: translateX(16px); }

        /* ── Node context menu ────────────────────────────── */
        .node-menu {
            position: fixed;
            background: var(--clr-surface);
            border: 1px solid var(--clr-border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            z-index: 500;
            min-width: 140px;
            padding: 0.3rem;
            animation: fadeIn .12s ease;
        }
        .node-menu-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.45rem 0.75rem;
            border-radius: var(--radius-sm);
            font-size: 0.83rem;
            color: var(--clr-text-muted);
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }
        .node-menu-item:hover { background: var(--clr-surface-2); color: var(--clr-text); }
        .node-menu-item.danger:hover { background: rgba(224,82,96,.1); color: var(--clr-danger); }

        /* ── Loading overlay ──────────────────────────────── */
        .node-loading {
            position: absolute;
            inset: 0;
            background: rgba(13,15,20,.6);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-md);
            z-index: 20;
        }

        /* ── Responsive hide ──────────────────────────────── */
        @media (max-width: 1024px) {
            .step-editor-shell { grid-template-columns: 200px 1fr 260px; }
        }
    </style>
</head>
<body>

<div id="toast-container"></div>

<!-- App Shell: Sidebar + Topbar -->
<div class="app-shell" id="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <header class="topbar" id="topbar"></header>

    <main class="main-content" style="padding:0;overflow:hidden;">

        <!-- Senaryo üst bar -->
        <div class="scenario-topbar" id="scenario-topbar">
            <nav class="breadcrumb">
                <a href="scenarios.html">Senaryolar</a>
                <span class="breadcrumb-sep">/</span>
                <span class="breadcrumb-current" id="breadcrumb-name">Yükleniyor...</span>
            </nav>

            <div class="view-toggle">
                <button class="view-toggle-btn active" id="btn-view-diagram">Diyagram</button>
                <button class="view-toggle-btn" id="btn-view-table">Tablo</button>
            </div>

            <div class="autosave-indicator" id="autosave-indicator">
                <span class="autosave-dot" id="autosave-dot"></span>
                <span id="autosave-text">Kaydedildi</span>
            </div>

            <div class="canvas-actions">
                <button class="btn btn-ghost btn-sm" id="btn-save">Kaydet</button>
                <button class="btn btn-primary btn-sm" id="btn-run" disabled>
                    &#9654; Çalıştır
                </button>
            </div>
        </div>

        <!-- 3 sütunlu editör -->
        <div class="step-editor-shell">

            <!-- SOL: Araç Paleti -->
            <div class="tool-palette">
                <div class="tool-palette-header">
                    <input type="text" class="tool-palette-search" id="action-search"
                           placeholder="Adım ara...">
                </div>
                <div class="tool-palette-body" id="action-palette">
                    <!-- JS ile doldurulur -->
                    <div class="empty-state" style="padding:2rem 1rem;">
                        <span class="spinner" style="width:1.2rem;height:1.2rem;border-color:var(--clr-border);border-top-color:var(--clr-primary);"></span>
                    </div>
                </div>
            </div>

            <!-- ORTA: Canvas -->
            <div class="step-canvas-wrap">

                <!-- Diyagram -->
                <div id="diagram-canvas">
                    <div class="diagram-surface">
                        <div class="diagram-viewport" id="diagram-viewport">
                            <svg id="connections-svg"></svg>
                            <!-- Nodlar buraya eklenir -->
                        </div>
                    </div>
                    <div class="drop-overlay" id="drop-overlay"></div>
                    <div class="canvas-empty" id="canvas-empty">
                        <span class="canvas-empty-icon">◈</span>
                        <span class="canvas-empty-text">Sol panelden buraya adım sürükleyin</span>
                    </div>
                </div>

                <!-- Tablo -->
                <div id="table-canvas">
                    <div class="table-wrapper">
                        <table class="step-table" id="step-table">
                            <thead>
                            <tr>
                                <th style="width:30px"></th>
                                <th style="width:40px">#</th>
                                <th>Aksiyon</th>
                                <th>Selector</th>
                                <th>Değer</th>
                                <th style="width:60px">Durum</th>
                                <th style="width:80px">İşlem</th>
                            </tr>
                            </thead>
                            <tbody id="step-tbody">
                            <!-- JS ile doldurulur -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>

            <!-- SAĞ: Özellikler -->
            <div class="step-props">
                <div class="props-header">
                    <span class="props-title">Adım Özellikleri</span>
                    <div class="props-actions" id="props-actions" style="display:none;">
                        <button class="btn-icon" id="btn-duplicate" title="Kopyala">&#10064;</button>
                        <button class="btn-icon" style="color:var(--clr-danger)" id="btn-delete" title="Sil">&#10005;</button>
                    </div>
                </div>
                <div class="props-body" id="props-body">
                    <div class="props-empty">
                        <span class="props-empty-icon">◉</span>
                        <span class="props-empty-text">Henüz seçili adım yok.<br>Bir node'a tıklayın.</span>
                    </div>
                </div>
            </div>

        </div>
    </main>
</div>

<!-- Node context menu -->
<div class="node-menu hidden" id="node-context-menu">
    <button class="node-menu-item" id="ctx-select">Seç</button>
    <button class="node-menu-item" id="ctx-duplicate">Kopyala</button>
    <button class="node-menu-item" id="ctx-toggle">Aktif/Pasif</button>
    <button class="node-menu-item danger" id="ctx-delete">Sil</button>
</div>

<!-- Scripts -->
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/store.js"></script>
<script src="../assets/js/toast.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/router.js"></script>
<script src="../js/components/sidebar.js"></script>
<script src="../js/components/topbar.js"></script>
<script src="../js/components/modal.js"></script>
<script src="../js/components/confirm-dialog.js"></script>
<script src="../js/pages/scenario-detail.js"></script>
</body>
</html>
