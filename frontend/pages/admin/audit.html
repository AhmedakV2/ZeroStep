<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroStep — Denetim Günlükleri (Audit)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../assets/css/main.css">
    <script src="../../assets/js/theme-init.js"></script>
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/layout.css">
    <style>
        .stagger-item {
            opacity: 0;
            transform: translateY(18px);
            animation: pageItemFadeUp 0.55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .delay-1 { animation-delay: 0.08s; }
        .delay-2 { animation-delay: 0.16s; }
        .delay-3 { animation-delay: 0.24s; }
        .delay-4 { animation-delay: 0.32s; }
        @keyframes pageItemFadeUp { to { opacity: 1; transform: translateY(0); } }

        .page-bg {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                    radial-gradient(ellipse 70% 50% at 15% 30%, rgba(158, 134, 232, 0.05) 0%, transparent 60%),
                    radial-gradient(ellipse 50% 40% at 85% 70%, rgba(158, 134, 232, 0.03) 0%, transparent 55%);
        }
        .page-content { position: relative; z-index: 1; }
    </style>
</head>
<body>
<div class="page-bg"></div>
<div id="toast-container"></div>

<div class="app-shell">
    <aside class="sidebar" id="sidebar" role="complementary"></aside>
    <header class="topbar" id="topbar" role="banner"></header>

    <main class="main-content page-content">
        <div class="stagger-item delay-1" style="display: flex; justify-content: flex-end; width: 100%;">
            <button class="btn btn-ghost" id="export-audit-btn">
                <i class="fas fa-download"></i> Dışa Aktar
            </button>
        </div>

        <div class="card filter-bar mt-4 stagger-item delay-2">
            <div style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
                <div class="form-group mb-0" style="flex: 1; min-width: 200px;">
                    <input type="text" class="form-input" id="audit-search" placeholder="Kullanıcı adı veya kaynak ara...">
                </div>
                <div class="form-group mb-0" style="flex: 1; min-width: 150px;">
                    <select class="form-input" id="audit-action-filter">
                        <option value="">Tüm İşlemler</option>
                        <option value="USER_CREATED">Kullanıcı Oluşturma</option>
                        <option value="USER_UPDATED">Kullanıcı Güncelleme</option>
                        <option value="USER_DELETED">Kullanıcı Silme</option>
                        <option value="LOGIN_SUCCESS">Başarılı Giriş</option>
                        <option value="LOGIN_FAILED">Hatalı Giriş</option>
                    </select>
                </div>
                <div class="form-group mb-0" style="flex: 1; min-width: 150px;">
                    <input type="date" class="form-input" id="audit-date-filter" title="Belirli bir tarih">
                </div>
                <button class="btn btn-primary" id="apply-filters-btn">
                    <i class="fas fa-filter"></i> Filtrele
                </button>
            </div>
        </div>

        <div class="card p-0 mt-4 stagger-item delay-3">
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>Tarih</th>
                        <th>Kullanıcı</th>
                        <th>İşlem (Action)</th>
                        <th>Kaynak (Resource)</th>
                        <th>IP Adresi</th>
                        <th>Durum</th>
                        <th style="text-align: right;">Detay</th>
                    </tr>
                    </thead>
                    <tbody id="audit-body">
                    <tr><td colspan="7" class="text-center p-8">Yükleniyor...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="pagination-container" class="mt-4 stagger-item delay-4"></div>
    </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script src="../../assets/js/chat-widget.js"></script>
<script src="../../assets/js/utils.js"></script>
<script src="../../assets/js/store.js"></script>
<script src="../../assets/js/toast.js"></script>
<script src="../../assets/js/router.js"></script>
<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/auth.js"></script>
<script src="../../js/components/sidebar.js"></script>
<script src="../../js/components/topbar.js"></script>
<script src="../../js/components/pagination.js"></script>
<script src="../../js/components/modal.js"></script>
<script src="../../js/pages/admin/admin-audit.js"></script>
</body>
</html>
