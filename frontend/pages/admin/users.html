<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroStep — Kullanıcı Yönetimi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- İKONLARIN GÖRÜNMESİ İÇİN FONTAWESOME EKLENDİ -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/layout.css">
</head>
<body>
<div id="toast-container"></div>


<div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <header class="topbar" id="topbar"></header>

    <main class="main-content">
        <div class="page-header">
            <div class="page-header-left">
                <h2 class="page-title">Kullanıcı Yönetimi</h2>
                <p class="page-subtitle">Sistem kullanıcılarını ve rollerini yönetin</p>
            </div>
            <button class="btn btn-primary" id="create-user-btn">
                <i class="fas fa-plus"></i> Yeni Kullanıcı
            </button>
        </div>

        <div class="card filter-bar mt-4">
            <div class="form-group mb-0">
                <input type="text" class="form-input" id="user-search" placeholder="Kullanıcı adı veya e-posta ile ara..." style="max-width: 350px;">
            </div>
        </div>

        <div class="card p-0 mt-4">
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>Kullanıcı Bilgisi</th>
                        <th>E-posta</th>
                        <th>Roller</th>
                        <th>Durum</th>
                        <th>Kayıt Tarihi</th>
                        <th style="text-align: right;">İşlemler</th>
                    </tr>
                    </thead>
                    <tbody id="users-body">
                    <tr><td colspan="6" class="text-center p-8">Yükleniyor...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div id="pagination-container" class="mt-4"></div>
    </main>
</div>

<!-- Scripts -->
<script src="../../assets/js/utils.js"></script>
<script src="../../assets/js/store.js"></script>
<script src="../../assets/js/toast.js"></script>
<script src="../../assets/js/router.js"></script>
<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/auth.js"></script>
<script src="../../js/components/sidebar.js"></script>
<script src="../../js/components/topbar.js"></script>
<script src="../../js/components/pagination.js"></script>
<script src="../../js/components/modal.js"></script>
<script src="../../js/components/confirm-dialog.js"></script>
<!-- Sayfa mantığı en son -->
<script src="../../js/pages/admin-users.js"></script>
</body>
</html>
