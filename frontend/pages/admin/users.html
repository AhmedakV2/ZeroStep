<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroStep — Kullanıcılar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/layout.css">
</head>
<body>
<div id="toast-container"></div>
<div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <header class="topbar" id="topbar"></header>
    <main class="main-content">
        <div class="page-header">
            <div class="page-header-left">
                <h2 class="page-title">Kullanıcı Yönetimi</h2>
                <p class="page-subtitle">Sistem kullanıcıları</p>
            </div>
            <button class="btn btn-primary" id="create-user-btn">+ Yeni Kullanıcı</button>
        </div>

        <div class="filter-bar">
            <input type="text" class="form-input" id="user-search" placeholder="Kullanıcı adı veya e-posta ara…" style="max-width:300px">
        </div>

        <div class="table-wrapper">
            <table class="data-table">
                <thead>
                <tr>
                    <th>Kullanıcı Adı</th>
                    <th>E-posta</th>
                    <th>Roller</th>
                    <th>Durum</th>
                    <th>Son Giriş</th>
                    <th>İşlemler</th>
                </tr>
                </thead>
                <tbody id="users-body">
                <tr><td colspan="6">
                    <div class="empty-state">
                        <span class="empty-state-msg">Yükleniyor…</span>
                    </div>
                </td></tr>
                </tbody>
            </table>
        </div>
        <div class="pagination-wrapper" id="pagination"></div>
    </main>
</div>
<script src="../../assets/js/utils.js"></script>
<script src="../../assets/js/store.js"></script>
<script src="../../assets/js/toast.js"></script>
<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/auth.js"></script>
<script src="../../assets/js/router.js"></script>
<script src="../../js/components/sidebar.js"></script>
<script src="../../js/components/topbar.js"></script>
<script src="../../js/components/pagination.js"></script>
<script src="../../js/components/modal.js"></script>
<script src="../../js/components/confirm-dialog.js"></script>
<script src="../../js/pages/admin-users.js"></script>
</body>
</html>
