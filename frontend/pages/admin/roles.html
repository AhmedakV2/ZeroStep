<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroStep — Rol Yönetimi</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="../../assets/css/main.css">
    <script src="../../assets/js/theme-init.js"></script>
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/layout.css">
</head>
<body>
<div id="toast-container"></div>

<div class="app-shell">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar" role="complementary"></aside>
    <!-- Topbar -->
    <header class="topbar" id="topbar" role="banner"></header>


    <main class="main-content">
        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <h2 class="page-title" style="margin: 0;">Rol Yönetimi</h2>
            <button class="btn btn-primary" id="create-role-btn">
                <i class="fas fa-plus"></i> Yeni Rol
            </button>
        </div>

        <div class="card filter-bar mt-4">
            <div class="form-group mb-0">
                <input type="text" class="form-input" id="role-search" placeholder="Rol adı ile ara..." style="max-width: 350px;">
            </div>
        </div>

        <div class="card p-0 mt-4">
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>Rol Adı</th>
                        <th>Açıklama</th>
                        <th>Kullanıcı Sayısı</th>
                        <th>Oluşturulma Tarihi</th>
                        <th style="text-align: right;">İşlemler</th>
                    </tr>
                    </thead>
                    <tbody id="roles-body">
                    <tr><td colspan="5" class="text-center p-8">Yükleniyor...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="pagination-container" class="mt-4"></div>
    </main>
</div>

<script src="../../assets/js/utils.js"></script>
<script src="../../assets/js/store.js"></script>
<script src="../../assets/js/toast.js"></script>
<script src="../../assets/js/router.js"></script>
<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/auth.js"></script>
<script src="../../js/components/sidebar.js"></script>
<script src="../../js/components/topbar.js"></script>
<script src="../../js/components/pagination.js"></script>
<script src="../../js/components/modal.js"></script>
<script src="../../js/components/confirm-dialog.js"></script>
<script src="../../js/pages/admin-roles.js"></script>
</body>
</html>
