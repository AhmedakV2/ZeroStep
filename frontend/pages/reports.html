<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroStep — Raporlar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css">
    <script src="../assets/js/theme-init.js"></script>    <script src="../assets/js/csp-helper.js"></script>
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <style>
        .stagger-item {
            opacity: 0;
            transform: translateY(18px);
            animation: pageItemFadeUp 0.55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .delay-1 { animation-delay: 0.08s; }
        .delay-2 { animation-delay: 0.16s; }
        .delay-3 { animation-delay: 0.24s; }
        @keyframes pageItemFadeUp { to { opacity: 1; transform: translateY(0); } }

        .page-bg {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                    radial-gradient(ellipse 70% 50% at 15% 30%, rgba(158, 134, 232, 0.05) 0%, transparent 60%),
                    radial-gradient(ellipse 50% 40% at 85% 70%, rgba(158, 134, 232, 0.03) 0%, transparent 55%);
        }
        .page-content { position: relative; z-index: 1; }

        .progress-bar { display: inline-block; height: 8px; background: #4caf50; border-radius: 4px; transition: width 0.4s ease; }
        .exec-box {
            display: inline-block; width: 24px; height: 24px; margin: 0 4px 4px 0;
            border-radius: 4px; cursor: default; opacity: 0.85; transition: opacity 0.15s;
        }
        .exec-box:hover { opacity: 1; }
        .exec-box.pass { background: #4caf50; }
        .exec-box.fail { background: #f44336; }
    </style>
</head>
<body>
<div class="page-bg"></div>
<div id="toast-container"></div>

<div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <header class="topbar" id="topbar"></header>
    <main class="main-content page-content">
        <div style="padding: 1.5rem 2rem;">

            <div class="stagger-item delay-1">
                <h2 style="font-size: 1.25rem; font-weight: 700; color: var(--clr-text); margin-bottom: 1.5rem;">Senaryo Performans Raporu</h2>
            </div>

            <div class="premium-card stagger-item delay-1">
                <label style="font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--clr-text-muted); display: block; margin-bottom: 0.5rem;">Raporlanacak Senaryoyu Seçin</label>
                <select id="select-scenario" class="form-input">
                    <option value="">— Seçin —</option>
                </select>
            </div>

            <div id="scenario-summary" style="display: none;">
                <div class="premium-card stagger-item delay-2" style="margin-top: 1.5rem;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem;">
                        <div>
                            <div style="font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--clr-text-muted);">Toplam Çalıştırma</div>
                            <div style="font-size: 2rem; font-weight: 700; color: var(--clr-primary);" id="sum-total">0</div>
                        </div>
                        <div>
                            <div style="font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--clr-text-muted);">Ortalama Süre</div>
                            <div style="font-size: 2rem; font-weight: 700; color: var(--clr-primary);" id="sum-avg-duration">—</div>
                        </div>
                        <div>
                            <div style="font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--clr-text-muted);">Genel Başarı Oranı</div>
                            <div style="font-size: 2rem; font-weight: 700; color: var(--clr-primary);" id="sum-pass-rate">—</div>
                        </div>
                    </div>

                    <div style="margin-top: 2rem;">
                        <div style="font-size: 0.75rem; font-weight: 600; color: var(--clr-text-muted); margin-bottom: 0.5rem;">Başarı Yüzdesi Grafiği</div>
                        <div style="width: 100%; height: 28px; background: var(--clr-surface-2); border-radius: 6px; overflow: hidden; border: 1px solid var(--clr-border);">
                            <div class="progress-bar" id="success-bar" style="width: 0%; height: 100%;">
                                <span style="color: white; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; justify-content: center; height: 100%; padding: 0 0.5rem;" id="progress-text">0%</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="premium-card stagger-item delay-3" style="margin-top: 1.5rem;">
                    <h3 style="margin-bottom: 1rem; font-size: 0.95rem; font-weight: 700; color: var(--clr-text);">Son 10 Çalıştırma Trendi</h3>
                    <div id="last-ten-grid" style="display: flex; flex-wrap: wrap; gap: 4px;"></div>
                    <p style="font-size: 0.75rem; color: var(--clr-text-muted); margin-top: 0.5rem;">Soldan sağa en yeniden eskiye doğru sıralanmıştır.</p>
                </div>
            </div>

            <div id="scenario-empty" class="stagger-item delay-2" style="text-align: center; padding: 4rem 2rem; color: var(--clr-text-muted); background: var(--clr-surface); border: 1px dashed var(--clr-border); border-radius: 8px; margin-top: 1.5rem;">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1rem; opacity: 0.5;">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                <p style="font-size: 1rem; font-weight: 600;">Görüntülenecek Veri Yok</p>
                <p style="font-size: 0.85rem; max-width: 300px; margin: 0.5rem auto 0;">Analiz ve rapor metriklerini görmek için lütfen yukarıdan bir senaryo seçin.</p>
            </div>

        </div>
    </main>
</div>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/store.js"></script>
<script src="../assets/js/toast.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/router.js"></script>
<script src="../js/components/sidebar.js"></script>
<script src="../js/components/topbar.js"></script>
<script src="../assets/js/chat-widget.js"></script>
<script src="../js/pages/reports.js"></script>
</body>
</html>
