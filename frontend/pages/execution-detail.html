<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroStep — Çalıştırma Detayı</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <style>
        .exec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1rem; }
        .exec-stats { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .stat { display: flex; flex-direction: column; gap: 0.25rem; }
        .stat-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--clr-text-muted); }
        .stat-value { font-size: 1rem; font-weight: 600; color: var(--clr-text); }
        .steps-list { list-style: none; padding: 0; }
        .step-item { padding: 0.75rem; border-bottom: 1px solid var(--clr-border); cursor: pointer; }
        .step-item:hover { background: var(--clr-surface-2); }
        .step-icon { font-size: 1.2rem; margin-right: 0.5rem; }
        .log-panel { background: #1a1a1a; border-radius: 0.5rem; padding: 1rem; font-family: 'IBM Plex Mono', monospace; height: 400px; overflow-y: auto; }
        .log-line { font-size: 0.8rem; line-height: 1.5; margin-bottom: 0.25rem; }
        .log-info { color: #e0e0e0; }
        .log-warn { color: #ffc107; }
        .log-error { color: #f44336; }
        .log-debug { color: #90caf9; }
        @media (max-width: 900px) { .exec-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div id="toast-container"></div>

<div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <header class="topbar" id="topbar"></header>
        <div style="padding: 1.5rem 2rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h2 style="font-size: 1.4rem; font-weight: 700; color: var(--clr-text);" id="exec-title">Çalıştırma Detayı</h2>
                <div style="display: flex; gap: 0.5rem;">
                    <button id="btn-pdf" class="btn btn-ghost btn-sm">📄 PDF</button>
                    <button id="btn-excel" class="btn btn-ghost btn-sm">📊 Excel</button>
                    <button id="btn-cancel" class="btn btn-danger btn-sm" style="display: none;">✕ İptal Et</button>
                </div>
            </div>

            <div class="premium-card" style="margin-bottom: 1rem;">
                <div class="exec-stats" id="exec-stats">
                    <div class="stat">
                        <span class="stat-label">Durum</span>
                        <span class="stat-value" id="stat-status">—</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Tetikleyen</span>
                        <span class="stat-value" id="stat-trigger" style="font-size: 0.9rem;">—</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Başlangıç</span>
                        <span class="stat-value" style="font-size: 0.9rem;" id="stat-started">—</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Süre</span>
                        <span class="stat-value" id="stat-duration">—</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Başarı</span>
                        <span class="stat-value" id="stat-success">—</span>
                    </div>
                </div>
            </div>

            <div class="exec-grid">
                <!-- SOL: ADIM SONUÇLARI -->
                <div class="premium-card">
                    <h3 style="margin-bottom: 1rem; font-size: 0.95rem; color: var(--clr-text);">Adım Sonuçları</h3>
                    <ul class="steps-list" id="steps-list">
                        <li style="padding: 1rem; text-align: center; color: var(--clr-text-muted);">Yükleniyor…</li>
                    </ul>
                </div>

                <!-- SAĞ: LOG PANEL -->
                <div class="premium-card">
                    <h3 style="margin-bottom: 1rem; font-size: 0.95rem; color: var(--clr-text);">Canlı Loglar</h3>
                    <div class="log-panel" id="log-panel"></div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="../assets/js/utils.js"></script>
<script src="../assets/js/store.js"></script>
<script src="../assets/js/toast.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/router.js"></script>
<script src="../js/components/sidebar.js"></script>
<script src="../js/components/topbar.js"></script>
<script src="../js/pages/execution-detail.js"></script>
</body>
</html>
