<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroStep — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css">
    <script src="../assets/js/theme-init.js"></script>
    <script src="../assets/js/csp-helper.js"></script>
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
</head>
<body class="dashboard-body">

<div class="bg-canvas"></div>
<div class="parallax-orb" id="orb1-wrap"><div class="floating-orb orb-1"></div></div>
<div class="parallax-orb" id="orb2-wrap"><div class="floating-orb orb-2"></div></div>
<div class="parallax-orb" id="orb3-wrap"><div class="floating-orb orb-3"></div></div>

<div id="toast-container"></div>

<div class="app-shell relative-z">
    <aside class="sidebar" id="sidebar" role="complementary"></aside>
    <header class="topbar" id="topbar" role="banner"></header>

    <main class="main-content" id="main-content">
        <div class="grid-4" id="stat-cards">
            <div class="stat-card stat-card-accent-blue stagger-item delay-1">
                <span class="stat-card-label">Toplam Çalıştırma</span>
                <span class="stat-card-value font-mono" id="stat-total">—</span>
            </div>
            <div class="stat-card stat-card-accent-green stagger-item delay-2">
                <span class="stat-card-label">Başarılı</span>
                <span class="stat-card-value font-mono" id="stat-passed">—</span>
            </div>
            <div class="stat-card stat-card-accent-red stagger-item delay-3">
                <span class="stat-card-label">Başarısız</span>
                <span class="stat-card-value font-mono" id="stat-failed">—</span>
            </div>
            <div class="stat-card stat-card-accent-orange stagger-item delay-4">
                <span class="stat-card-label">Aktif Schedule</span>
                <span class="stat-card-value font-mono" id="stat-schedule">—</span>
            </div>
        </div>

        <div class="card mt-3 glass-card stagger-item delay-5">
            <div class="card-header">
                <h3 class="card-title">Son Çalıştırmalar</h3>
                <a href="executions.html" class="btn btn-ghost btn-sm">Tümünü Gör</a>
            </div>
            <div class="table-wrapper" id="executions-table-wrapper">
                <table class="data-table" id="executions-table">
                    <thead>
                    <tr>
                        <th>Senaryo</th>
                        <th>Durum</th>
                        <th>Süre</th>
                        <th>Adımlar</th>
                        <th>Tarih</th>
                    </tr>
                    </thead>
                    <tbody id="executions-body">
                    <tr><td colspan="5">
                        <div class="empty-state">
                            <span class="empty-state-icon">▶</span>
                            <p class="empty-state-msg">Henüz çalıştırma yok</p>
                        </div>
                    </td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- Temel scriptler — sıra önemli -->
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/store.js"></script>
<script src="../assets/js/toast.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/router.js"></script>
<script src="../js/components/sidebar.js"></script>
<script src="../js/components/topbar.js"></script>
<script src="../js/components/pagination.js"></script>
<script src="../js/components/modal.js"></script>
<script src="../js/components/confirm-dialog.js"></script>
<script src="../js/pages/dashboard.js"></script>
<!-- Chat widget: SockJS + Stomp + widget (en sona, diğer scriptler hazır olsun) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script src="../assets/js/chat-widget.js"></script>
</body>
</html>
