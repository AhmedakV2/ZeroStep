<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroStep — Çalıştırmalar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css">
    <script src="../assets/js/theme-init.js"></script>
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
</head>
<body>
<div id="toast-container"></div>

<div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <header class="topbar" id="topbar"></header>
    <main class="main-content">
        <div style="padding: 1.5rem 2rem;">
            <div class="card" style="padding: 0; overflow: hidden;">
                <div style="padding: 1.5rem;">
                    <h3 style="font-size: 1rem; font-weight: 700; color: var(--clr-text); margin-bottom: 1rem;">Filtreler</h3>
                    <div style="display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-end;">
                        <div style="flex: 1; min-width: 160px;">
                            <label style="font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--clr-text-muted); margin-bottom: 0.3rem; display: block;">Senaryo Adı</label>
                            <input type="text" id="filter-scenario" class="form-input" placeholder="Ara..." style="width: 100%;">
                        </div>
                        <div style="flex: 1; min-width: 140px;">
                            <label style="font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--clr-text-muted); margin-bottom: 0.3rem; display: block;">Durum</label>
                            <select id="filter-status" class="form-input" style="width: 100%;">
                                <option value="">Tümü</option>
                                <option value="QUEUED">Kuyrukta</option>
                                <option value="RUNNING">Çalışıyor</option>
                                <option value="COMPLETED">Tamamlandı</option>
                                <option value="FAILED">Başarısız</option>
                                <option value="CANCELLED">İptal Edildi</option>
                                <option value="TIMEOUT">Zaman Aşımı</option>
                            </select>
                        </div>
                        <div style="flex: 1; min-width: 160px;">
                            <label style="font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--clr-text-muted); margin-bottom: 0.3rem; display: block;">Başlangıç</label>
                            <input type="datetime-local" id="filter-from" class="form-input" style="width: 100%;">
                        </div>
                        <div style="flex: 1; min-width: 160px;">
                            <label style="font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--clr-text-muted); margin-bottom: 0.3rem; display: block;">Bitiş</label>
                            <input type="datetime-local" id="filter-to" class="form-input" style="width: 100%;">
                        </div>
                        <button id="btn-filter" class="btn btn-primary btn-sm" style="align-self: flex-end;">Filtrele</button>
                    </div>
                </div>
            </div>

            <div class="card" style="padding: 0; overflow: hidden; margin-top: 1.5rem;">
                <div class="table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Senaryo</th>
                                <th>Durum</th>
                                <th>Süre</th>
                                <th>Adımlar</th>
                                <th>Tarih</th>
                            </tr>
                        </thead>
                        <tbody id="executions-tbody">
                            <tr>
                                <td colspan="5">
                                    <div class="empty-state">
                                        <span class="empty-state-icon">▶</span>
                                        <p class="empty-state-msg">Yükleniyor…</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="pagination-container"></div>
        </div>
    </main>
</div>

<script src="../assets/js/utils.js"></script>
<script src="../assets/js/store.js"></script>
<script src="../assets/js/toast.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/router.js"></script>
<script src="../js/components/sidebar.js"></script>
<script src="../js/components/topbar.js"></script>
<script src="../js/pages/executions.js"></script>
</body>
</html>
